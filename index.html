<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Collection</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --ink:#15130f;
  --ink-2:#1d1a14;
  --card:#211d16;
  --paper:#efe8d8;
  --paper-dim:#c9c0ac;
  --paper-faint:#8a8270;
  --rust:#c1602e;
  --rust-dim:#8a4522;
  --teal:#3c655d;
  --gold-line:#4a4030;
  --danger:#a4432c;
  --radius:3px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:var(--ink);
  color:var(--paper);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--rust);color:var(--ink);}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:var(--ink);}
::-webkit-scrollbar-thumb{background:var(--gold-line);border-radius:5px;}

.display{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:0.02em;}
.mono{font-family:'IBM Plex Mono',monospace;}

#app{display:flex;flex-direction:column;height:100vh;}

/* ---------- HEADER ---------- */
header{
  display:flex;align-items:center;gap:16px;
  padding:14px 20px;
  border-bottom:1px solid var(--gold-line);
  background:linear-gradient(180deg,var(--ink-2),var(--ink));
  flex-wrap:wrap;
}
.brand{display:flex;align-items:baseline;gap:10px;margin-right:auto;}
.brand .mark{
  width:34px;height:34px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #3a352a, var(--ink) 70%);
  border:1px solid var(--gold-line);
  position:relative;flex:none;
}
.brand .mark::after{
  content:'';position:absolute;inset:13px;border-radius:50%;background:var(--ink);border:1px solid var(--gold-line);
}
.brand h1{font-size:20px;margin:0;font-weight:600;letter-spacing:0.06em;}
.brand .count{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--paper-faint);letter-spacing:0.04em;}

.search-wrap{position:relative;flex:1 1 260px;max-width:420px;}
.search-wrap input{
  width:100%;padding:9px 12px 9px 32px;
  background:var(--ink-2);border:1px solid var(--gold-line);border-radius:var(--radius);
  color:var(--paper);font-size:14px;font-family:'Inter',sans-serif;
}
.search-wrap input:focus{outline:none;border-color:var(--rust);}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--paper-faint);}

.view-toggle{display:flex;border:1px solid var(--gold-line);border-radius:var(--radius);overflow:hidden;}
.view-toggle button{
  background:var(--ink-2);color:var(--paper-dim);border:none;padding:8px 12px;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.05em;text-transform:uppercase;
}
.view-toggle button.active{background:var(--rust);color:var(--ink);}
.view-toggle button+button{border-left:1px solid var(--gold-line);}

.icon-btn{
  background:var(--ink-2);border:1px solid var(--gold-line);color:var(--paper-dim);
  border-radius:var(--radius);padding:8px 10px;cursor:pointer;font-size:12px;
  font-family:'IBM Plex Mono',monospace;letter-spacing:0.03em;display:flex;align-items:center;gap:6px;
}
.icon-btn:hover{border-color:var(--rust);color:var(--paper);}

/* ---------- LAYOUT ---------- */
.body-row{display:flex;flex:1;min-height:0;}
aside{
  width:220px;flex:none;border-right:1px solid var(--gold-line);
  overflow-y:auto;padding:14px 0;background:var(--ink-2);
}
aside .section-label{
  font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--paper-faint);
  letter-spacing:0.1em;padding:0 16px;margin:14px 0 6px;text-transform:uppercase;
}
.artist-item{
  display:flex;justify-content:space-between;gap:8px;
  padding:6px 16px;cursor:pointer;font-size:13px;color:var(--paper-dim);
  border-left:2px solid transparent;
}
.artist-item:hover{color:var(--paper);background:rgba(255,255,255,0.03);}
.artist-item.active{color:var(--rust);border-left-color:var(--rust);background:rgba(193,96,46,0.08);}
.artist-item .n{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--paper-faint);}

.genre-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;margin:3px 6px 3px 0;border-radius:20px;
  font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.03em;
  border:1px solid var(--gold-line);color:var(--paper-dim);cursor:pointer;
}
.genre-chip.active{border-color:var(--rust);color:var(--rust);}
.genre-dot{width:7px;height:7px;border-radius:50%;flex:none;}

main{flex:1;overflow-y:auto;padding:18px 22px;min-width:0;}

.toolbar-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.result-count{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--paper-faint);}
select.sortsel{
  background:var(--ink-2);border:1px solid var(--gold-line);color:var(--paper-dim);
  padding:7px 10px;border-radius:var(--radius);font-family:'IBM Plex Mono',monospace;font-size:11px;
}

/* ---------- LIST VIEW ---------- */
.row{
  display:flex;align-items:center;gap:14px;
  padding:10px 12px;margin-bottom:4px;border-radius:var(--radius);
  background:var(--card);cursor:pointer;border:1px solid transparent;
  position:relative;overflow:hidden;
}
.row:hover{border-color:var(--gold-line);}
.row .spine{width:4px;align-self:stretch;border-radius:2px;flex:none;}
.row .catno{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--paper-faint);width:38px;flex:none;text-align:right;}
.row .thumb{
  width:40px;height:40px;flex:none;border-radius:2px;object-fit:cover;
  background:var(--ink-2);border:1px solid var(--gold-line);
}
.row .thumb.placeholder{display:flex;align-items:center;justify-content:center;font-family:'Oswald';color:var(--paper-faint);font-size:14px;}
.row .meta{flex:1;min-width:0;}
.row .meta .t1{font-family:'Oswald',sans-serif;font-size:15px;text-transform:none;letter-spacing:0.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.row .meta .t2{font-size:11px;color:var(--paper-faint);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.row .stats{display:flex;gap:16px;flex:none;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--paper-dim);}
.row .stats .s{text-align:right;min-width:44px;}
.row .stats .s .lbl{display:block;font-size:8px;color:var(--paper-faint);letter-spacing:0.05em;}

/* ---------- GRID VIEW ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;}
.card{cursor:pointer;}
.card .cover{
  width:100%;aspect-ratio:1;border-radius:2px;object-fit:cover;
  background:var(--ink-2);border:1px solid var(--gold-line);margin-bottom:8px;
}
.card .cover.placeholder{display:flex;align-items:center;justify-content:center;font-family:'Oswald';color:var(--paper-faint);font-size:26px;text-align:center;padding:8px;}
.card .t1{font-family:'Oswald',sans-serif;font-size:13px;text-transform:none;line-height:1.2;}
.card .t2{font-size:10px;color:var(--paper-faint);margin-top:2px;}

/* ---------- DRAWER ---------- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:40;display:none;}
.overlay.show{display:block;}
.drawer{
  position:fixed;top:0;right:0;bottom:0;width:min(480px,100%);
  background:var(--ink-2);border-left:1px solid var(--gold-line);
  z-index:41;transform:translateX(100%);transition:transform 0.25s ease;
  overflow-y:auto;
}
.drawer.show{transform:translateX(0);}
.drawer-head{padding:16px 20px;border-bottom:1px solid var(--gold-line);display:flex;justify-content:space-between;align-items:flex-start;}
.drawer-head .catno{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--rust);letter-spacing:0.1em;}
.drawer-head h2{font-family:'Oswald',sans-serif;font-size:22px;margin:4px 0 2px;text-transform:none;font-weight:500;}
.drawer-head .artist{font-size:13px;color:var(--paper-dim);}
.drawer-head button.close{background:none;border:none;color:var(--paper-faint);font-size:20px;cursor:pointer;}

.covers-row{display:flex;gap:10px;padding:16px 20px;}
.covers-row .cover-slot{flex:1;text-align:center;}
.covers-row img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:2px;border:1px solid var(--gold-line);}
.covers-row .placeholder{
  width:100%;aspect-ratio:1;border-radius:2px;border:1px dashed var(--gold-line);
  display:flex;align-items:center;justify-content:center;color:var(--paper-faint);font-size:11px;
}
.covers-row .lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--paper-faint);margin-top:4px;letter-spacing:0.05em;}

.meta-table{padding:6px 20px 16px;}
.meta-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px;}
.meta-row .k{color:var(--paper-faint);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.05em;text-transform:uppercase;}
.meta-row .v{text-align:right;max-width:65%;}

.action-row{display:flex;gap:8px;padding:14px 20px;flex-wrap:wrap;border-top:1px solid var(--gold-line);}
.action-row button{
  flex:1;background:var(--ink);border:1px solid var(--gold-line);color:var(--paper-dim);
  padding:9px 8px;border-radius:var(--radius);cursor:pointer;font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:0.04em;text-transform:uppercase;min-width:110px;
}
.action-row button:hover{border-color:var(--rust);color:var(--paper);}
.action-row a.icon-btn{text-decoration:none;text-align:center;justify-content:center;flex:1;min-width:110px;}

.tracks-box{padding:6px 20px 20px;}
.tracks-box h4{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.08em;color:var(--paper-faint);text-transform:uppercase;margin:10px 0 8px;}
.track-line{display:flex;justify-content:space-between;gap:10px;padding:5px 0;font-size:12px;border-bottom:1px dotted rgba(255,255,255,0.08);}
.track-line .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.track-line .dur{font-family:'IBM Plex Mono',monospace;color:var(--paper-dim);flex:none;}
.sync-status{font-size:11px;color:var(--paper-faint);padding:0 20px 10px;}
.candidate-list{padding:0 20px 16px;}
.candidate{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 10px;border:1px solid var(--gold-line);border-radius:var(--radius);margin-bottom:6px;font-size:12px;
}
.candidate button{background:var(--rust);color:var(--ink);border:none;padding:5px 10px;border-radius:2px;cursor:pointer;font-size:10px;font-family:'IBM Plex Mono',monospace;}

/* ---------- SETTINGS MODAL ---------- */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:50;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-back.show{display:flex;}
.modal{background:var(--ink-2);border:1px solid var(--gold-line);border-radius:4px;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--gold-line);display:flex;justify-content:space-between;align-items:center;}
.modal-head h2{font-family:'Oswald';font-size:18px;margin:0;font-weight:500;}
.modal-body{padding:18px 20px;}
.field{margin-bottom:16px;}
.field label{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.06em;color:var(--paper-faint);text-transform:uppercase;margin-bottom:6px;}
.field input{
  width:100%;padding:9px 10px;background:var(--ink);border:1px solid var(--gold-line);
  border-radius:var(--radius);color:var(--paper);font-family:'IBM Plex Mono',monospace;font-size:12px;
}
.field .hint{font-size:11px;color:var(--paper-faint);margin-top:5px;line-height:1.4;}
.field .test-row{display:flex;gap:8px;margin-top:8px;align-items:center;}
.field .test-result{font-size:11px;color:var(--paper-dim);}
.modal-footer{padding:14px 20px;border-top:1px solid var(--gold-line);display:flex;gap:8px;flex-wrap:wrap;}
.btn-primary{background:var(--rust);color:var(--ink);border:none;padding:10px 16px;border-radius:var(--radius);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.04em;text-transform:uppercase;}
.btn-secondary{background:none;color:var(--paper-dim);border:1px solid var(--gold-line);padding:10px 16px;border-radius:var(--radius);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.04em;text-transform:uppercase;}

.progress-wrap{padding:0 20px 16px;}
.progress-bar{height:6px;background:var(--ink);border-radius:3px;overflow:hidden;border:1px solid var(--gold-line);}
.progress-bar .fill{height:100%;background:var(--rust);width:0%;transition:width 0.2s;}
.progress-text{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--paper-faint);margin-top:6px;}

.empty-state{text-align:center;padding:60px 20px;color:var(--paper-faint);}
.empty-state .em-title{font-family:'Oswald';font-size:18px;color:var(--paper-dim);margin-bottom:6px;}

.cm-row{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:10px;margin-bottom:6px;background:var(--card);border-radius:var(--radius);
}
.cm-row .thumb{width:40px;height:40px;flex:none;}
.cm-search-box{width:100%;order:99;}
.cm-search-box input{
  width:100%;padding:8px 10px;margin-top:8px;background:var(--ink);border:1px solid var(--gold-line);
  color:var(--paper);border-radius:var(--radius);font-family:'IBM Plex Mono',monospace;font-size:11px;
}
.cm-search-results{max-height:220px;overflow-y:auto;margin-top:8px;}

@media (max-width:760px){
  aside{position:fixed;left:0;top:0;bottom:0;z-index:39;transform:translateX(-100%);transition:transform 0.2s;}
  aside.show{transform:translateX(0);}
  .row .stats{display:none;}
  .brand h1{font-size:16px;}
}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="brand">
      <div class="mark"></div>
      <div>
        <h1>The Collection</h1>
        <div class="count" id="headerCount">— albums</div>
      </div>
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="searchInput" type="text" placeholder="Search artist, album, label…">
    </div>
    <div class="view-toggle">
      <button data-view="list" class="active">List</button>
      <button data-view="grid">Grid</button>
    </div>
    <button class="icon-btn" id="menuToggle" style="display:none;">Artists</button>
    <span class="result-count" id="authStatus" style="margin-right:4px;">Not signed in</span>
    <button class="icon-btn" id="signInBtn">Sign in with Google</button>
    <button class="icon-btn" id="signOutBtn" style="display:none;">Sign out</button>
    <button class="icon-btn" id="settingsBtn">⚙ Settings</button>
  </header>

  <div class="body-row">
    <aside id="sidebar">
      <div class="section-label">Genres</div>
      <div id="genreChips" style="padding:0 12px;"></div>
      <div class="section-label">Artists (<span id="artistCount">0</span>)</div>
      <div id="artistList"></div>
    </aside>
    <main id="mainArea">
      <div class="toolbar-row">
        <div class="result-count" id="resultCount"></div>
        <select class="sortsel" id="sortSelect">
          <option value="artist">Sort: Artist</option>
          <option value="year">Sort: Year</option>
          <option value="title">Sort: Title</option>
          <option value="added">Sort: Recently added</option>
        </select>
        <button class="icon-btn" id="addAlbumBtn">+ Add album</button>
      </div>
      <div id="content"></div>
    </main>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer"></div>

<!-- Settings Modal -->
<div class="modal-back" id="settingsModal">
  <div class="modal">
    <div class="modal-head">
      <h2>Settings</h2>
      <button class="icon-btn" id="closeSettings">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Covers root folder ID (ScanDoc/Covers)</label>
        <input type="text" id="coversRootInput" placeholder="folder ID from the Drive URL" value="12FpztvK69oydBJNWaXRJWIh1rmaMo2aj">
      </div>
      <div class="field">
        <label>Music root folder ID (MULTIMEDIA/MUSIC)</label>
        <input type="text" id="musicRootInput" placeholder="folder ID from the Drive URL">
      </div>
      <div class="field">
        <label>Drive index</label>
        <div class="hint" id="indexStatus">No index built yet.</div>
        <div class="test-row">
          <button class="icon-btn" id="rebuildIndexBtn">Rebuild from Drive</button>
        </div>
        <div class="hint" style="margin-top:10px;">Requires signing in with Google (top right). Rebuilds live from your Drive — run it again any time you add new CDs.</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-primary" id="saveSettingsBtn">Save</button>
      <button class="btn-secondary" id="bulkSyncBtn">Match covers</button>
      <button class="btn-secondary" id="exportBtn">Export backup (JSON)</button>
      <button class="btn-secondary" id="importBtn">Import backup</button>
      <input type="file" id="importFile" accept=".json" style="display:none;">
    </div>
    <div class="progress-wrap" id="progressWrap" style="display:none;">
      <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText"></div>
      <button class="btn-secondary" id="cancelSyncBtn" style="margin-top:8px;">Cancel</button>
    </div>
  </div>
</div>

<!-- Cover Matcher Modal -->
<div class="modal-back" id="coverMatcherModal">
  <div class="modal" style="max-width:640px;">
    <div class="modal-head">
      <h2>Match Covers</h2>
      <button class="icon-btn" id="closeCoverMatcher">✕</button>
    </div>
    <div class="modal-body">
      <div class="sync-status" id="coverMatcherSummary" style="padding:0 0 12px;"></div>
      <div id="coverMatcherList"></div>
    </div>
  </div>

<script>
/* ============ STATE ============ */
let ALBUMS = [];
let SETTINGS = {};
let DRIVE_INDEX = null; // { covers: {name,id,folders:[],files:[]}, music: {...}, importedAt }
let VIEW = 'list';
let searchQuery = '';
let filterArtist = null;
let filterGenre = null;
let sortKey = 'artist';
let bulkCancel = false;
let currentDrawerAlbumId = null;

const GENRE_PALETTE = ['#c1602e','#3c655d','#8a6d3b','#6b5b95','#a4432c','#4f7a63','#7a5230','#5a6b8c','#8a4522','#3e6e6e'];

/* ============ STORAGE (IndexedDB — works for a locally-opened file) ============ */
const DB_NAME = 'cd-catalog-db';
const STORE_NAME = 'kv';
let dbPromise = null;
function openDB(){
  if(dbPromise) return dbPromise;
  dbPromise = new Promise((resolve, reject)=>{
    if(typeof indexedDB === 'undefined'){ reject(new Error('IndexedDB not available in this browser.')); return; }
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = ()=>{ req.result.createObjectStore(STORE_NAME); };
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
  return dbPromise;
}
function idbGet(key){
  return openDB().then(db => new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).get(key);
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  }));
}
function idbSet(key, value){
  return openDB().then(db => new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put(value, key);
    tx.oncomplete = ()=> resolve(true);
    tx.onerror = ()=> reject(tx.error);
  }));
}
function showStorageWarning(msg){
  let el = document.getElementById('storageWarning');
  if(!el){
    el = document.createElement('div');
    el.id = 'storageWarning';
    el.style.cssText = 'background:var(--danger);color:#fff;padding:8px 16px;font-family:IBM Plex Mono,monospace;font-size:11px;text-align:center;';
    document.body.insertBefore(el, document.body.firstChild);
  }
  el.textContent = msg;
}

async function loadData(){
  let loadedAlbums = null;
  try{
    loadedAlbums = await idbGet('catalog-albums-v1');
  }catch(e){
    showStorageWarning('This browser can\'t save data for a local file. Use Chrome or Edge, and export a backup often — nothing will persist otherwise.');
  }

  if(loadedAlbums && loadedAlbums.length){
    ALBUMS = loadedAlbums;
  } else {
    const seed = JSON.parse(document.getElementById('seed-data').textContent);
    ALBUMS = seed.map(a => Object.assign({}, a, { drive:{}, artUrl:null, artSource:null }));
    await saveAlbums();
  }

  try{
    const s = await idbGet('catalog-settings-v1');
    if(s) SETTINGS = Object.assign({}, SETTINGS, s);
  }catch(e){ /* keep defaults */ }

  try{
    const idx = await idbGet('drive-index-v1');
    if(idx) DRIVE_INDEX = idx;
  }catch(e){ /* none yet */ }
}
async function saveDriveIndex(){
  try{ await idbSet('drive-index-v1', DRIVE_INDEX); }
  catch(e){ console.error('save index failed', e); showStorageWarning('Could not save the Drive index — it will not survive a reload. ' + e.message); }
}

let saveTimer = null;
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveAlbums, 900);
  scheduleCloudSave();
}
async function saveAlbums(){
  try{ await idbSet('catalog-albums-v1', ALBUMS); }
  catch(e){ console.error('save failed', e); showStorageWarning('Could not save your changes — they will not survive a reload. ' + e.message); }
}
async function saveSettings(){
  try{ await idbSet('catalog-settings-v1', SETTINGS); }
  catch(e){ console.error('save settings failed', e); }
}

/* ============ GOOGLE SIGN-IN ============ */
// EDIT THIS before hosting: paste your OAuth Web Client ID from Google Cloud
// Console (Credentials → Create Credentials → OAuth client ID → Web application).
const GOOGLE_CLIENT_ID = 'PASTE_YOUR_OAUTH_CLIENT_ID_HERE.apps.googleusercontent.com';
const DRIVE_SCOPES = 'https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/drive.file';

let accessToken = null;
let tokenClient = null;
let signedInEmail = null;
let cloudDataFileId = null;

function initGoogleAuth(){
  if(typeof google === 'undefined' || !google.accounts){
    setTimeout(initGoogleAuth, 300);
    return;
  }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: DRIVE_SCOPES,
    callback: ()=>{} // overridden per-call by requestAccessTokenPromise
  });
  updateAuthUI();
  // Try a silent sign-in so returning visitors don't have to click every time.
  requestAccessTokenPromise({ prompt:'none' }).then(onSignedIn).catch(()=>{ /* needs explicit click */ });
}

function requestAccessTokenPromise(opts){
  return new Promise((resolve, reject)=>{
    if(!tokenClient){ reject(new Error('Google sign-in not ready yet.')); return; }
    tokenClient.callback = (resp)=>{
      if(resp.error){ reject(new Error(resp.error)); return; }
      accessToken = resp.access_token;
      resolve(resp);
    };
    try{ tokenClient.requestAccessToken(opts); }
    catch(e){ reject(e); }
  });
}

async function signIn(){
  try{
    await requestAccessTokenPromise({ prompt:'' });
    await onSignedIn();
  }catch(e){
    showStorageWarning('Sign-in failed: ' + e.message);
  }
}
function signOut(){
  if(accessToken && google.accounts && google.accounts.oauth2){
    google.accounts.oauth2.revoke(accessToken, ()=>{});
  }
  accessToken = null;
  signedInEmail = null;
  cloudDataFileId = null;
  updateAuthUI();
}

async function onSignedIn(){
  try{
    const res = await driveApiFetch('https://www.googleapis.com/oauth2/v3/userinfo');
    const info = await res.json();
    signedInEmail = info.email || null;
  }catch(e){ /* not critical */ }
  updateAuthUI();
  await syncFromCloudOnSignIn();
}

function updateAuthUI(){
  const el = document.getElementById('authStatus');
  const signInBtn = document.getElementById('signInBtn');
  const signOutBtn = document.getElementById('signOutBtn');
  if(!el) return;
  if(accessToken){
    el.textContent = signedInEmail ? ('Signed in as ' + signedInEmail) : 'Signed in';
    signInBtn.style.display = 'none';
    signOutBtn.style.display = '';
  } else {
    el.textContent = 'Not signed in';
    signInBtn.style.display = '';
    signOutBtn.style.display = 'none';
  }
}

// Wraps fetch() with the current Google access token, retrying once after a
// silent refresh if the token turned out to be expired.
async function driveApiFetch(url, options){
  options = options || {};
  if(!accessToken) throw new Error('Not signed in to Google.');
  options.headers = Object.assign({}, options.headers, { Authorization: 'Bearer ' + accessToken });
  let res = await fetch(url, options);
  if(res.status === 401){
    await requestAccessTokenPromise({ prompt:'' });
    options.headers.Authorization = 'Bearer ' + accessToken;
    res = await fetch(url, options);
  }
  return res;
}

/* ============ CLOUD DATA FILE (your own Drive, via drive.file scope) ============ */
async function findCloudDataFile(){
  const q = "name='cd-catalog-data.json' and trashed=false";
  const res = await driveApiFetch('https://www.googleapis.com/drive/v3/files?q=' + encodeURIComponent(q) + '&fields=' + encodeURIComponent('files(id,modifiedTime)') + '&spaces=drive');
  const data = await res.json();
  return (data.files && data.files[0]) || null;
}
async function createCloudDataFile(contentObj){
  const boundary = 'cdcatalog' + Date.now();
  const metadata = { name: 'cd-catalog-data.json', mimeType: 'application/json' };
  const body =
    '--' + boundary + '\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n' + JSON.stringify(metadata) + '\r\n' +
    '--' + boundary + '\r\nContent-Type: application/json\r\n\r\n' + JSON.stringify(contentObj) + '\r\n' +
    '--' + boundary + '--';
  const res = await driveApiFetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
    method: 'POST',
    headers: { 'Content-Type': 'multipart/related; boundary=' + boundary },
    body: body
  });
  const data = await res.json();
  return data.id;
}
async function updateCloudDataFile(fileId, contentObj){
  await driveApiFetch('https://www.googleapis.com/upload/drive/v3/files/' + fileId + '?uploadType=media', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(contentObj)
  });
}
async function downloadCloudDataFile(fileId){
  const res = await driveApiFetch('https://www.googleapis.com/drive/v3/files/' + fileId + '?alt=media');
  return await res.json();
}

async function syncFromCloudOnSignIn(){
  try{
    const f = await findCloudDataFile();
    if(f){
      cloudDataFileId = f.id;
      const data = await downloadCloudDataFile(f.id);
      if(data.albums && data.albums.length){ ALBUMS = data.albums; await saveAlbums(); }
      if(data.settings){ SETTINGS = Object.assign({}, SETTINGS, data.settings); await saveSettings(); }
      render();
    } else {
      // No cloud file yet: push whatever is currently local as the first copy.
      cloudDataFileId = await createCloudDataFile({ albums: ALBUMS, settings: SETTINGS, savedAt: new Date().toISOString() });
    }
  }catch(e){
    console.error('cloud sync failed', e);
    showStorageWarning('Could not sync with Google Drive: ' + e.message);
  }
}

let cloudSaveTimer = null;
function scheduleCloudSave(){
  if(!accessToken) return;
  clearTimeout(cloudSaveTimer);
  cloudSaveTimer = setTimeout(saveToCloud, 1500);
}
async function saveToCloud(){
  if(!accessToken) return;
  const payload = { albums: ALBUMS, settings: SETTINGS, savedAt: new Date().toISOString() };
  try{
    if(cloudDataFileId){ await updateCloudDataFile(cloudDataFileId, payload); }
    else{ cloudDataFileId = await createCloudDataFile(payload); }
  }catch(e){ console.error('cloud save failed', e); }
}

/* ============ LIVE DRIVE LISTING (real OAuth — replaces the Apps Script index) ============ */
async function listChildrenLive(parentId, foldersOnly){
  let q = "'" + parentId + "' in parents and trashed = false";
  q += foldersOnly ? " and mimeType = 'application/vnd.google-apps.folder'" : " and mimeType != 'application/vnd.google-apps.folder'";
  let out = [], pageToken = null;
  do{
    const url = 'https://www.googleapis.com/drive/v3/files?q=' + encodeURIComponent(q) +
      '&fields=' + encodeURIComponent('nextPageToken, files(id,name,mimeType)') +
      '&pageSize=1000' + (pageToken ? '&pageToken=' + encodeURIComponent(pageToken) : '');
    const res = await driveApiFetch(url);
    const data = await res.json();
    out = out.concat(data.files || []);
    pageToken = data.nextPageToken;
  } while(pageToken);
  return out;
}
async function listChildrenBatchLive(parentIds, foldersOnly, onProgress){
  const result = {};
  parentIds.forEach(id=>{ result[id] = []; });
  const BATCH = 10;
  for(let i=0; i<parentIds.length; i+=BATCH){
    const batch = parentIds.slice(i, i+BATCH);
    const orClause = batch.map(id=>"'" + id + "' in parents").join(' or ');
    let q = '(' + orClause + ') and trashed = false';
    q += foldersOnly ? " and mimeType = 'application/vnd.google-apps.folder'" : " and mimeType != 'application/vnd.google-apps.folder'";
    let pageToken = null;
    do{
      const url = 'https://www.googleapis.com/drive/v3/files?q=' + encodeURIComponent(q) +
        '&fields=' + encodeURIComponent('nextPageToken, files(id,name,mimeType,parents)') +
        '&pageSize=1000' + (pageToken ? '&pageToken=' + encodeURIComponent(pageToken) : '');
      const res = await driveApiFetch(url);
      const data = await res.json();
      (data.files || []).forEach(f=>{
        (f.parents || []).forEach(p=>{ if(result.hasOwnProperty(p)) result[p].push(f); });
      });
      pageToken = data.nextPageToken;
    } while(pageToken);
    if(onProgress) onProgress(Math.min(i+BATCH, parentIds.length), parentIds.length);
  }
  return result;
}
async function buildTreeLive(rootId, rootLabel, onProgress){
  const artistFolders = await listChildrenLive(rootId, true);
  const artistNodes = artistFolders.map(f=>({ id:f.id, name:f.name, folders:[], files:[] }));
  if(artistNodes.length===0) return { id: rootId, name: rootLabel, folders: [], files: [] };
  const albumFoldersByArtist = await listChildrenBatchLive(artistNodes.map(a=>a.id), true, onProgress);
  const allAlbumIds = [];
  artistNodes.forEach(artist=>{
    (albumFoldersByArtist[artist.id] || []).forEach(al=>{
      artist.folders.push({ id: al.id, name: al.name, files: [] });
      allAlbumIds.push(al.id);
    });
  });
  if(allAlbumIds.length){
    const filesByAlbum = await listChildrenBatchLive(allAlbumIds, false, onProgress);
    artistNodes.forEach(artist=>{
      artist.folders.forEach(albumNode=>{
        albumNode.files = (filesByAlbum[albumNode.id] || []).map(f=>({ id:f.id, name:f.name, mimeType:f.mimeType }));
      });
    });
  }
  return { id: rootId, name: rootLabel, folders: artistNodes, files: [] };
}
async function rebuildDriveIndex(){
  const statusEl = document.getElementById('indexStatus');
  if(!accessToken){ if(statusEl) statusEl.textContent = 'Sign in with Google first.'; return; }
  if(!SETTINGS.coversRootId || !SETTINGS.musicRootId){ if(statusEl) statusEl.textContent = 'Fill in both folder IDs first.'; return; }
  try{
    if(statusEl) statusEl.textContent = 'Reading your Covers folder…';
    const coverFiles = await listChildrenLive(SETTINGS.coversRootId, false);
    if(statusEl) statusEl.textContent = 'Reading your Music folder (this can take a minute for large collections)…';
    const musicTree = await buildTreeLive(SETTINGS.musicRootId, 'Music', (done,total)=>{
      if(statusEl) statusEl.textContent = 'Reading your Music folder… ' + done + '/' + total;
    });
    DRIVE_INDEX = {
      covers: { files: coverFiles.map(f=>({ id:f.id, name:f.name, mimeType:f.mimeType })) },
      music: musicTree,
      importedAt: new Date().toISOString()
    };
    invalidateCoverGroups();
    await saveDriveIndex();
    updateIndexStatus();
  }catch(e){
    if(statusEl) statusEl.textContent = 'Error building index: ' + e.message;
  }
}
function normalize(s){
  return (s||'').toLowerCase().normalize('NFKD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,' ').trim();
}
function genreColor(g){
  let hash = 0;
  for(let i=0;i<g.length;i++) hash = (hash*31 + g.charCodeAt(i)) & 0xffffffff;
  return GENRE_PALETTE[Math.abs(hash) % GENRE_PALETTE.length];
}
function fmtDuration(sec){
  if(sec === null || sec === undefined || isNaN(sec)) return '—';
  sec = Math.round(sec);
  const m = Math.floor(sec/60), s = sec%60;
  return m + ':' + String(s).padStart(2,'0');
}
function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* ============ DERIVED DATA ============ */
function allArtists(){
  const map = new Map();
  ALBUMS.forEach(a=>{
    map.set(a.artist, (map.get(a.artist)||0)+1);
  });
  return Array.from(map.entries()).sort((a,b)=>a[0].localeCompare(b[0]));
}
function allGenres(){
  const set = new Set();
  ALBUMS.forEach(a=> (a.genre||[]).forEach(g=>set.add(g)));
  return Array.from(set).sort();
}
function getFiltered(){
  let list = ALBUMS.slice();
  if(filterArtist) list = list.filter(a=>a.artist===filterArtist);
  if(filterGenre) list = list.filter(a=>(a.genre||[]).includes(filterGenre));
  if(searchQuery){
    const q = normalize(searchQuery);
    list = list.filter(a=> normalize(a.artist).includes(q) || normalize(a.title).includes(q) || normalize(a.label||'').includes(q));
  }
  list.sort((a,b)=>{
    if(sortKey==='artist') return (a.artistSort||a.artist).localeCompare(b.artistSort||b.artist) || (a.year||0)-(b.year||0);
    if(sortKey==='year') return (a.year||0)-(b.year||0);
    if(sortKey==='title') return a.title.localeCompare(b.title);
    if(sortKey==='added') return new Date(b.addedDate) - new Date(a.addedDate);
    return 0;
  });
  return list;
}

/* ============ COVER MATCHING (flat file list, no folder structure) ============ */
// Your cover scans use shorthand codes ("AE_GetAGrip_Front.jpg"), not full
// names, so this scores candidates instead of assuming a sure match.
let COVER_GROUPS = null;

function buildCoverGroups(){
  if(!DRIVE_INDEX || !DRIVE_INDEX.covers || !DRIVE_INDEX.covers.files) return [];
  const files = DRIVE_INDEX.covers.files;
  const groups = {};
  files.forEach(f=>{
    const stem = f.name.replace(/\.[a-zA-Z0-9]+$/, '');
    let role = 'front', key = stem;
    if(/_back$/i.test(stem)){ role='back'; key = stem.replace(/_back$/i,''); }
    else if(/_front$/i.test(stem)){ role='front'; key = stem.replace(/_front$/i,''); }
    const gkey = key.toLowerCase();
    if(!groups[gkey]) groups[gkey] = { key: key, front:null, back:null };
    if(role==='back'){ if(!groups[gkey].back) groups[gkey].back = f; }
    else{ if(!groups[gkey].front) groups[gkey].front = f; else if(!groups[gkey].back) groups[gkey].back = f; }
  });
  return Object.keys(groups).map(k=>groups[k]);
}
function getCoverGroups(){
  if(!COVER_GROUPS) COVER_GROUPS = buildCoverGroups();
  return COVER_GROUPS;
}
function invalidateCoverGroups(){ COVER_GROUPS = null; }

function camelSplit(s){
  return s
    .replace(/([a-z0-9])([A-Z])/g,'$1 $2')
    .replace(/([A-Z]+)([A-Z][a-z])/g,'$1 $2')
    .replace(/([A-Za-z])([0-9])/g,'$1 $2')
    .replace(/([0-9])([A-Za-z])/g,'$1 $2');
}
function tokenize(s){ return normalize(camelSplit(s)).split(' ').filter(Boolean); }

function guessArtistCodes(artistName){
  const words = artistName.replace(/[^A-Za-z0-9 &]/g,'').trim().split(/\s+/).filter(Boolean);
  const codes = [];
  if(words.length===0) return codes;
  if(words.length===1){
    codes.push(words[0].slice(0,2).toLowerCase());
    codes.push(words[0].slice(0,3).toLowerCase());
  } else {
    codes.push(words.map(w=>w[0]||'').join('').toLowerCase());
  }
  return codes;
}

function scoreGroupForAlbum(group, album){
  const parts = group.key.split('_');
  const code = (parts[0]||'').toLowerCase();
  const slug = parts.slice(1).join(' ') || group.key;
  const slugTokens = tokenize(slug);
  const titleTokens = tokenize(album.title);
  const artistTokens = tokenize(album.artist);
  let score = 0;
  slugTokens.forEach(t=>{
    if(t.length<2) return;
    if(titleTokens.indexOf(t)!==-1) score += 3;
    else if(titleTokens.some(tt=> tt.length>2 && (tt.indexOf(t)===0 || t.indexOf(tt)===0))) score += 1.5;
    if(artistTokens.indexOf(t)!==-1) score += 1;
  });
  const yearTok = slugTokens.find(t=>/^(19|20)\d{2}$/.test(t));
  if(yearTok && album.year && parseInt(yearTok,10)===album.year) score += 3;
  if(guessArtistCodes(album.artist).indexOf(code)!==-1) score += 4;
  return score;
}

function bestAlbumMatchesForGroup(group, limit){
  return ALBUMS.map(a=>({ album:a, score: scoreGroupForAlbum(group,a) }))
    .filter(x=>x.score>0)
    .sort((x,y)=>y.score-x.score)
    .slice(0, limit||5);
}
function bestGroupMatchesForAlbum(album, limit){
  return getCoverGroups().map(g=>({ group:g, score: scoreGroupForAlbum(g,album) }))
    .filter(x=>x.score>0)
    .sort((x,y)=>y.score-x.score)
    .slice(0, limit||5);
}
function groupIsUsed(group){
  return ALBUMS.some(a=> a.drive && ((group.front && a.drive.coverFrontId===group.front.id) || (group.back && a.drive.coverBackId===group.back.id)));
}
function applyGroupToAlbum(group, album){
  album.drive = album.drive || {};
  album.drive.coverGroupKey = group.key;
  album.drive.coverFrontId = group.front ? group.front.id : (group.back ? group.back.id : null);
  album.drive.coverBackId = group.back ? group.back.id : null;
  if(album.drive.coverFrontId){
    album.artSource = 'drive';
    album.artUrl = driveImageUrl(album.drive.coverFrontId);
  }
  scheduleSave();
}
function driveImageUrl(fileId){
  return 'https://drive.google.com/thumbnail?id=' + fileId + '&sz=w800';
}
function driveFolderLink(id){
  return 'https://drive.google.com/drive/folders/' + id;
}

function findArtistNode(rootNode, artistName){
  if(!rootNode || !rootNode.folders) return null;
  const target = normalize(artistName);
  let match = rootNode.folders.find(f=>normalize(f.name)===target);
  if(!match) match = rootNode.folders.find(f=> normalize(f.name).includes(target) || target.includes(normalize(f.name)));
  return match || null;
}

function findAlbumCandidates(artistNode, album){
  if(!artistNode || !artistNode.folders) return [];
  const nt = normalize(album.title);
  const scored = artistNode.folders.map(f=>{
    const yearMatch = f.name.match(/(\d{4})/);
    const y = yearMatch ? parseInt(yearMatch[1],10) : null;
    const nn = normalize(f.name.replace(/^\[\d{4}\]\s*/,''));
    let score = 0;
    if(y && album.year && y===album.year) score += 2;
    if(nn===nt) score += 3;
    else if(nn && nt && (nn.includes(nt) || nt.includes(nn))) score += 1;
    return Object.assign({}, f, { score:score, year:y });
  }).filter(f=>f.score>0).sort((x,y)=>y.score-x.score);
  return scored;
}

function handleSyncCover(album){
  const statusEl = document.getElementById('syncStatus');
  const candArea = document.getElementById('candidateArea');
  candArea.innerHTML = '';
  if(!DRIVE_INDEX || !DRIVE_INDEX.covers || !DRIVE_INDEX.covers.files.length){
    statusEl.textContent = 'No Drive index yet — sign in and build one in Settings. Falling back to online lookup…';
    fetchItunesCover(album).then(ok=>{
      statusEl.textContent = ok ? 'Used online cover art (not your scan).' : 'No cover found anywhere.';
      scheduleSave(); render(); refreshDrawerIfOpen();
    });
    return;
  }
  const matches = bestGroupMatchesForAlbum(album, 5);
  if(matches.length===0){
    statusEl.textContent = 'No likely match found in your scans. Falling back to online lookup…';
    fetchItunesCover(album).then(ok=>{
      statusEl.textContent = ok ? 'Used online cover art (not your scan).' : 'No cover found anywhere.';
      scheduleSave(); render(); refreshDrawerIfOpen();
    });
    return;
  }
  statusEl.textContent = 'Best guesses from your scans — confirm one:';
  candArea.innerHTML = matches.map(m=>`
    <div class="candidate">
      <span>${escapeHtml(m.group.key)} <span class="mono" style="color:var(--paper-faint)">(score ${m.score.toFixed(1)})</span></span>
      <button data-key="${escapeHtml(m.group.key)}">Use this</button>
    </div>
  `).join('');
  candArea.querySelectorAll('button[data-key]').forEach(btn=>{
    btn.onclick = ()=>{
      const key = btn.getAttribute('data-key');
      const g = getCoverGroups().find(x=>x.key===key);
      if(g){
        applyGroupToAlbum(g, album);
        statusEl.textContent = 'Cover linked from your scans.';
        candArea.innerHTML = '';
        render();
        refreshDrawerIfOpen();
      }
    };
  });
}

async function handleSyncTracks(album){
  const statusEl = document.getElementById('syncStatus');
  if(!DRIVE_INDEX || !DRIVE_INDEX.music){
    statusEl.textContent = 'No Drive index yet — sign in with Google and click Rebuild in Settings.';
    return;
  }
  statusEl.textContent = 'Searching your Drive index for the music folder…';
  try{
    const artistNode = findArtistNode(DRIVE_INDEX.music, album.artist);
    if(!artistNode) throw new Error('No matching artist folder found in the Music index.');
    const candidates = findAlbumCandidates(artistNode, album);
    if(candidates.length===0) throw new Error('Artist folder found, but no matching album folder.');
    const folderId = candidates[0].id;
    const folderNode = artistNode.folders.find(f=>f.id===folderId);
    const files = (folderNode && folderNode.files) || [];
    const audio = files.filter(f=>f.mimeType && f.mimeType.indexOf('audio/')===0)
      .sort((a,b)=>a.name.localeCompare(b.name, undefined, {numeric:true}));
    if(audio.length===0) throw new Error('Album folder matched, but no audio files found inside.');

    if(!accessToken){
      throw new Error('Sign in with Google to read exact track lengths.');
    }
    const tracks = [];
    let failCount = 0;
    for(let i=0;i<audio.length;i++){
      statusEl.textContent = 'Reading track ' + (i+1) + ' of ' + audio.length + (failCount? ' ('+failCount+' failed so far)':'') + '…';
      const dur = await readAudioDurationAuth(audio[i].id);
      if(dur===null) failCount++;
      tracks.push({ name: audio[i].name, fileId: audio[i].id, duration: dur });
    }
    album.drive = album.drive || {};
    album.drive.musicFolderId = folderId;
    album.drive.tracksSynced = tracks;
    album.drive.lastSynced = new Date().toISOString();
    if(!album.drive.albumFolderId) album.drive.albumFolderId = folderId;
    statusEl.textContent = failCount
      ? 'Read ' + tracks.length + ' tracks, ' + failCount + ' length(s) could not be read (try again).'
      : 'Read ' + tracks.length + ' tracks with exact lengths.';
    scheduleSave();
    refreshDrawerIfOpen();
  }catch(e){
    statusEl.textContent = 'Error: ' + e.message;
  }
}

function readAudioDurationAuth(fileId){
  return driveApiFetch('https://www.googleapis.com/drive/v3/files/' + fileId + '?alt=media')
    .then(res=>{
      if(!res.ok) return null;
      return res.blob().then(blob=>{
        const url = URL.createObjectURL(blob);
        return new Promise(resolve=>{
          const a = new Audio();
          const t = setTimeout(()=>{ URL.revokeObjectURL(url); resolve(null); }, 15000);
          a.onloadedmetadata = ()=>{ clearTimeout(t); const d = a.duration; URL.revokeObjectURL(url); resolve(d); };
          a.onerror = ()=>{ clearTimeout(t); URL.revokeObjectURL(url); resolve(null); };
          a.src = url;
        });
      });
    })
    .catch(()=>null);
}

/* ============ ITUNES FALLBACK ============ */
async function fetchItunesCover(album){
  try{
    const term = encodeURIComponent(album.artist + ' ' + album.title);
    const res = await fetch('https://itunes.apple.com/search?term=' + term + '&entity=album&limit=1');
    const data = await res.json();
    if(data.results && data.results[0]){
      album.artUrl = data.results[0].artworkUrl100.replace('100x100bb.jpg','600x600bb.jpg');
      album.artSource = 'itunes';
      return true;
    }
  }catch(e){ console.error(e); }
  return false;
}

/* ============ COVER MATCHER SCREEN ============ */
const skippedThisSession = new Set();

function openCoverMatcher(){
  renderCoverMatcherList();
  document.getElementById('coverMatcherModal').classList.add('show');
}
function closeCoverMatcher(){
  document.getElementById('coverMatcherModal').classList.remove('show');
}

function renderCoverMatcherList(){
  const listEl = document.getElementById('coverMatcherList');
  const summaryEl = document.getElementById('coverMatcherSummary');
  const withCover = ALBUMS.filter(a=>a.drive && a.drive.coverFrontId).length;
  summaryEl.textContent = withCover + ' of ' + ALBUMS.length + ' albums have a linked cover.';

  if(!DRIVE_INDEX || !DRIVE_INDEX.covers || !DRIVE_INDEX.covers.files.length){
    listEl.innerHTML = '<div class="empty-state">No Drive index yet — sign in with Google and build one in Settings.</div>';
    return;
  }

  const todo = ALBUMS.filter(a=> !(a.drive && a.drive.coverFrontId) && !skippedThisSession.has(a.id));
  if(todo.length===0){
    listEl.innerHTML = '<div class="empty-state">Nothing left to review this session — reopen later for any new scans.</div>';
    return;
  }

  const batch = todo.slice(0,40);
  listEl.innerHTML = batch.map(a=>{
    const matches = bestGroupMatchesForAlbum(a,3);
    const top = matches[0];
    const thumbFile = top ? (top.group.front||top.group.back) : null;
    const thumb = thumbFile
      ? `<img class="thumb" src="${driveImageUrl(thumbFile.id)}" loading="lazy">`
      : `<div class="thumb placeholder">?</div>`;
    return `<div class="cm-row">
      ${thumb}
      <div class="meta" style="flex:1;min-width:160px;">
        <div class="t1">${escapeHtml(a.artist)} — ${escapeHtml(a.title)}</div>
        <div class="t2">${top ? 'Guess: '+escapeHtml(top.group.key)+' (score '+top.score.toFixed(1)+')' : 'No likely match found'}</div>
      </div>
      <div style="display:flex;gap:6px;flex:none;">
        ${top ? `<button class="icon-btn cm-accept" data-album="${a.id}" data-key="${escapeHtml(top.group.key)}">Accept</button>` : ''}
        <button class="icon-btn cm-search" data-album="${a.id}">Search</button>
        <button class="icon-btn cm-skip" data-album="${a.id}">Skip</button>
      </div>
      <div class="cm-search-box" id="cm-search-${a.id}" style="display:none;"></div>
    </div>`;
  }).join('') + (todo.length>40 ? `<div class="sync-status">…and ${todo.length-40} more. Resolve these first, then reopen.</div>` : '');

  listEl.querySelectorAll('.cm-accept').forEach(btn=>{
    btn.onclick = ()=>{
      const albumId = parseInt(btn.getAttribute('data-album'));
      const key = btn.getAttribute('data-key');
      const album = ALBUMS.find(x=>x.id===albumId);
      const g = getCoverGroups().find(x=>x.key===key);
      if(album && g){ applyGroupToAlbum(g, album); render(); renderCoverMatcherList(); }
    };
  });
  listEl.querySelectorAll('.cm-skip').forEach(btn=>{
    btn.onclick = ()=>{ skippedThisSession.add(parseInt(btn.getAttribute('data-album'))); renderCoverMatcherList(); };
  });
  listEl.querySelectorAll('.cm-search').forEach(btn=>{
    btn.onclick = ()=>{
      const albumId = parseInt(btn.getAttribute('data-album'));
      const box = document.getElementById('cm-search-'+albumId);
      if(box.style.display==='none'){
        box.style.display='block';
        box.innerHTML = `<input type="text" placeholder="Search cover filenames…" class="cm-search-input">` +
          `<div class="cm-search-results"></div>`;
        const input = box.querySelector('.cm-search-input');
        const resEl = box.querySelector('.cm-search-results');
        input.addEventListener('input', ()=>{
          const q = normalize(input.value);
          const groups = getCoverGroups().filter(g=> !q || normalize(g.key).includes(q)).slice(0,15);
          resEl.innerHTML = groups.map(g=>`<div class="candidate"><span>${escapeHtml(g.key)}</span><button data-key="${escapeHtml(g.key)}">Use</button></div>`).join('');
          resEl.querySelectorAll('button').forEach(b2=>{
            b2.onclick = ()=>{
              const album = ALBUMS.find(x=>x.id===albumId);
              const g = getCoverGroups().find(x=>x.key===b2.getAttribute('data-key'));
              if(album && g){ applyGroupToAlbum(g, album); render(); renderCoverMatcherList(); }
            };
          });
        });
        input.focus();
      } else {
        box.style.display='none';
        box.innerHTML='';
      }
    };
  });
}

/* ============ SETTINGS MODAL ============ */
function countIndexFiles(node){
  if(!node) return 0;
  let n = (node.files||[]).length;
  (node.folders||[]).forEach(f=> n += countIndexFiles(f));
  return n;
}
function updateIndexStatus(){
  const el = document.getElementById('indexStatus');
  if(!DRIVE_INDEX){
    el.textContent = 'No index built yet.';
    return;
  }
  const coversCount = countIndexFiles(DRIVE_INDEX.covers);
  const musicCount = countIndexFiles(DRIVE_INDEX.music);
  const when = DRIVE_INDEX.importedAt ? new Date(DRIVE_INDEX.importedAt).toLocaleString() : 'unknown time';
  el.textContent = 'Loaded: ' + coversCount + ' files in Covers, ' + musicCount + ' files in Music. Imported ' + when + '.';
}
function openSettings(){
  document.getElementById('coversRootInput').value = SETTINGS.coversRootId || '';
  document.getElementById('musicRootInput').value = SETTINGS.musicRootId || '';
  updateIndexStatus();
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings(){
  SETTINGS.coversRootId = document.getElementById('coversRootInput').value.trim();
  SETTINGS.musicRootId = document.getElementById('musicRootInput').value.trim();
  saveSettings();
  document.getElementById('settingsModal').classList.remove('show');
}

/* ============ EXPORT / IMPORT ============ */
function exportBackup(){
  const blob = new Blob([JSON.stringify({ albums: ALBUMS, settings: Object.assign({},SETTINGS,{apiKey:''}) }, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cd-collection-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}
function importBackup(file){
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const data = JSON.parse(e.target.result);
      if(data.albums){
        ALBUMS = data.albums;
        await saveAlbums();
      }
      if(data.settings){
        SETTINGS = Object.assign({}, SETTINGS, data.settings);
        await saveSettings();
      }
      render();
      alert('Backup imported.');
    }catch(err){
      alert('Could not read that file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

/* ============ WIRE UP ============ */
function wireGlobalEvents(){
  document.getElementById('searchInput').addEventListener('input', (e)=>{
    searchQuery = e.target.value;
    render();
  });
  document.querySelectorAll('.view-toggle button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      VIEW = btn.getAttribute('data-view');
      document.querySelectorAll('.view-toggle button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderContent();
    });
  });
  document.getElementById('sortSelect').addEventListener('change', (e)=>{
    sortKey = e.target.value;
    renderContent();
  });
  document.getElementById('addAlbumBtn').addEventListener('click', addNewAlbum);
  document.getElementById('settingsBtn').addEventListener('click', openSettings);
  document.getElementById('closeSettings').addEventListener('click', closeSettings);
  document.getElementById('saveSettingsBtn').addEventListener('click', closeSettings);
  document.getElementById('signInBtn').addEventListener('click', signIn);
  document.getElementById('signOutBtn').addEventListener('click', signOut);
  document.getElementById('rebuildIndexBtn').addEventListener('click', rebuildDriveIndex);
  document.getElementById('bulkSyncBtn').addEventListener('click', ()=>{ closeSettings(); openCoverMatcher(); });
  document.getElementById('closeCoverMatcher').addEventListener('click', closeCoverMatcher);
  document.getElementById('cancelSyncBtn').addEventListener('click', ()=>{ bulkCancel = true; });
  document.getElementById('exportBtn').addEventListener('click', exportBackup);
  document.getElementById('importBtn').addEventListener('click', ()=> document.getElementById('importFile').click());
  document.getElementById('importFile').addEventListener('change', (e)=>{
    if(e.target.files[0]) importBackup(e.target.files[0]);
  });
}

/* ============ INIT ============ */
(async function init(){
  await loadData();
  wireGlobalEvents();
  render();
  initGoogleAuth();
})();
